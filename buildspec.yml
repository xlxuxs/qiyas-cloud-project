version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REGION=us-east-1
      - REPO_NAME=qiyas-cloud-project
      - REPO_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${REPO_NAME}"
      - echo "REPO_URI=$REPO_URI"
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REPO_URI
  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t qiyas-cloud-project:latest .
      - docker tag qiyas-cloud-project:latest $REPO_URI:latest
      - echo "Pushing to ECR..."
      - docker push $REPO_URI:latest
  post_build:
    commands:
      - echo "Build completed successfully!"
      - echo "Image: $REPO_URI:latest"
      - printf '[{"name":"qiyas-app","imageUri":"%s:latest"}]' $REPO_URI > imagedefinitions.json
artifacts:
  files:
    - imagedefinitions.json
